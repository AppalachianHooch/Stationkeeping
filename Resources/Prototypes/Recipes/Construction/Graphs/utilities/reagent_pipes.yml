- type: constructionGraph
  id: ReagentPipe
  start: start
  graph:
  - node: start
    edges:
    - to: straight
      steps:
      - material: Steel
        amount: 1
        doAfter: 1
    - to: bend
      steps:
      - material: Steel
        amount: 1
        doAfter: 1
    - to: tjunction
      steps:
      - material: Steel
        amount: 1
        doAfter: 1
    - to: fourway
      steps:
      - material: Steel
        amount: 1
        doAfter: 1
    - to: pump
      steps:
      - material: Steel
        amount: 2
        doAfter: 2
    - to: valve
      steps:
      - material: Steel
        amount: 2
        doAfter: 2
    - to: inputPort
      steps:
      - material: Steel
        amount: 2
        doAfter: 2
    - to: outputPort
      steps:
      - material: Steel
        amount: 2
        doAfter: 2

  - node: straight
    entity: ReagentPipeStraight
    edges:
    - to: start
      conditions:
      - !type:EntityAnchored
        anchored: false
      completed:
      - !type:SpawnPrototype
        prototype: SheetSteel1
        amount: 1
      - !type:DeleteEntity
      steps:
      - tool: Welding
        doAfter: 1

