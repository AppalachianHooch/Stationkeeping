- type: constructionGraph
  id: CoolantPipe
  start: start
  graph:
  - node: start
    edges:
    - to: straight
      steps:
      - material: Steel
        amount: 1
        doAfter: 1
    - to: bend
      steps:
      - material: Steel
        amount: 1
        doAfter: 1
    - to: tjunction
      steps:
      - material: Steel
        amount: 1
        doAfter: 1
    - to: fourway
      steps:
      - material: Steel
        amount: 1
        doAfter: 1
    - to: valve
      steps:
      - material: Steel
        amount: 2
        doAfter: 2
    - to: fillPort
      steps:
      - material: Steel
        amount: 2
        doAfter: 2
    - to: heatExchanger
      steps:
      - material: Steel
        amount: 3
        doAfter: 3

  - node: straight
    entity: CoolantPipeStraight
    edges:
    - to: start
      conditions:
      - !type:EntityAnchored
        anchored: false
      completed:
      - !type:SpawnPrototype
        prototype: SheetSteel1
        amount: 1
      - !type:DeleteEntity
      steps:
      - tool: Welding
        doAfter: 1

